<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="g" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#7c5cff" />
      <stop offset="60%" stop-color="#ff6fb5" />
    </linearGradient>
    <filter id="f1" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="10" result="b" />
      <feMerge>
        <feMergeNode in="b" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="url(#g)" />
  <!-- subtle noise like overlay using small opacity -->
  <rect width="1200" height="630" fill="#ffffff" opacity="0.02" />

  <!-- Left decorative rounded block -->
  <g transform="translate(90,90)">
    <rect width="1020" height="450" rx="26" fill="rgba(255,255,255,0.06)" />
  </g>

  <g transform="translate(120,200)">
    <text x="0" y="0" font-family="Inter, Arial, Helvetica, sans-serif" font-weight="800" font-size="56" fill="#ffffff">✨ Estética Delicado</text>
    <text x="0" y="70" font-family="Inter, Arial, Helvetica, sans-serif" font-weight="600" font-size="28" fill="#fff" opacity="0.95">Cílios e Unhas em Gel — Realce sua beleza natural</text>

    <rect x="0" y="110" width="420" height="56" rx="16" fill="#ffffff" opacity="0.08" />
    <text x="24" y="150" font-family="Inter, Arial, Helvetica, sans-serif" font-weight="700" font-size="20" fill="#ffffff">Agende agora • (11) 99999-9999</text>
  </g>

  <!-- small brand mark bottom-right -->
  <g transform="translate(900,500)">
    <circle cx="30" cy="30" r="30" fill="#ffffff" opacity="0.18" />
    <text x="-6" y="38" font-family="Inter, Arial, Helvetica, sans-serif" font-weight="700" font-size="24" fill="#fff">✨</text>
  </g>
</svg>
